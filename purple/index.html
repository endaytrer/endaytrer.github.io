<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伪造紫码生成器</title>
    <script src="../node_modules/vue/dist/vue.min.js"></script>
    <script src="../node_modules/jquery/dist/jquery.min.js"></script>
    <script src="../node_modules/qrcodejs2/qrcode.min.js"></script>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div class="container">
            <div class="topContainer">
                <img src="http://eps.xjtu.edu.cn/xsfw/sys/swpubapp/userinfo/getUserPhoto.do?USERID=2183214664"
                    class="photograph" alt="this is your photo" />
                <div class="textContainer">
                    <p>2183214664 顾真榕 <small class="smallText">本科生</small></p>
                    <p>钱学森书院/少年班84</p>
                </div>
            </div>
            <div class="mainContentContainer">
                <div class="dataContainer">
                    <div class="title">
                        <h3>当前时间：</h3>
                    </div>
                    <div class="timeDate">
                        <div id="date">{{ nowDate }}</div>
                        <div id="time">{{ nowTime }}</div>
                        <p>已于 2020-05-08 18:05:00 完成报到登记</p>
                    </div>
                </div>
                <div class="qrContainer">
                    <p>本科生</p>
                    <div id="qrCode"></div>
                </div>
            </div>
        </div>
        <div class="bottomBar">
            <div class="button">交大校园码</div>
            <div class="button">返校申请</div>
            <div class="button active">外出申请</div>
            <div class="button">转码申请</div>
        </div>
        <script>
            var app = new Vue({
                el: "#app",
                data: {
                    nowDate: "",
                    nowTime: ""
                },
                created: function () {
                    this.timer();
                    this.getData();
                },
                methods: {
                    getData() {
                        var aDate = new Date();
                        this.nowDate = (aDate.getMonth() + 1 <= 9 ? "0" + (aDate.getMonth() + 1) : aDate
                            .getMonth() + 1) + "月" + (aDate
                            .getDate() <= 9 ? "0" + aDate.getDate() : aDate.getDate()) + "日";
                        this.nowTime = (aDate.getHours() <= 9 ? "0" +
                            aDate.getHours() : aDate.getHours()) + ":" + (aDate.getMinutes() <= 9 ? "0" +
                            aDate
                            .getMinutes() :
                            aDate.getMinutes()) + ":" + (aDate.getSeconds() <= 9 ? "0" + aDate
                            .getSeconds() :
                            aDate.getSeconds());
                    },
                    timer() {
                        return setInterval(() => {
                            this.getData();
                        }, 100);
                    }
                },
                destroyed: function () {
                    clearInterval(this.timer);
                }
            })
        </script>
</body>

</html>
